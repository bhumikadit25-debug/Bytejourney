<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f1f3f6; }
header { background:#0f172a; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
nav a { color:white; margin-left:20px; text-decoration:none; }
nav a:hover { color:#38bdf8; }

.container { display:flex; padding:20px; gap:20px; }
.sidebar { width:250px; background:white; padding:20px; border-radius:10px; }
.content { flex:1; }

.products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; }

.card {
background:white;
padding:15px;
border-radius:12px;
text-align:center;
transition:0.3s;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card:hover {
transform: translateY(-8px) scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img {
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.price { color:green; font-weight:bold; }

button {
background:#2563eb;
color:white;
border:none;
padding:8px;
cursor:pointer;
border-radius:6px;
}

button:hover {
background:#1d4ed8;
}

</style>
</head>

<body>

<header>
<h2>My Store</h2>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Cart (<span id="cart-count">0</span>)</a>
</nav>
</header>

<div class="container">

<div class="sidebar">
<h3>Search & Price</h3>

<p>Search</p>
<input type="text" id="search" placeholder="Search product">

<p>Price Range</p>
<input type="range" id="price" min="0" max="3000" step="100">
<span id="price-value">0</span>

<!-- filters hidden initially -->
<div id="extra-filters" style="display:none;">
<p>Color</p>
<label><input type="checkbox" value="red" class="color"> Red</label>
<label><input type="checkbox" value="black" class="color"> Black</label>

<p>Brand</p>
<label><input type="checkbox" value="Nike" class="brand"> Nike</label>
<label><input type="checkbox" value="Adidas" class="brand"> Adidas</label>
<label><input type="checkbox" value="Puma" class="brand"> Puma</label>
<label><input type="checkbox" value="Apple" class="brand"> Apple</label>
<lable><input type="checkbox" value="Boat" class="Boat"> Boat</lable>
</div>

</div>

<div class="content">

<select id="sort">
<option value="">Sort</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

<div class="products" id="products"></div>

</div>
</div>

<script>
const products = [
{ name:"Nike Shoes", price:1200, color:"black", brand:"Nike", category:"shoes", img:"https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=715&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },
{ name:"Adidas Shoes", price:1500, color:"red", brand:"Adidas", category:"shoes", img:"https://images.unsplash.com/photo-1691067951700-138ca8f4841f?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },
{ name:"Puma Shoes", price:1000, color:"red", brand:"Puma", category:"shoes", img:"https://images.unsplash.com/photo-1626298038175-e9f383124e1f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },

{ name:"T-Shirt", price:700, color:"black", category:"tshirt", img:"https:/images.unsplash.com/photo-1759572095317-3a96f9a98e2b?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },


{ name:"Travel Bag", price:1200, color:"black", category:"bag", img:"https://images.unsplash.com/photo-1673505705680-36437a06ee27?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },
{ name:"School Bag", price:900, color:"red", category:"bag", img:"https://media.istockphoto.com/id/1984624137/photo/gray-fabric-backpack-isolated-on-a-white-background-accessories-fashion-design-object.jpg?s=1024x1024&w=is&k=20&c=t0xczEU2H0zFxjIGHhe3ai__Co4P4VQXKWO86a1xW54=" },

{ name:"Apple Headphones", price:2000, brand:"Apple", category:"headphones", img:"https://images.unsplash.com/photo-1644496037559-93aa68b058da?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },
{ name:"Boat Headphones", price:1500, brand:"boat", category:"headphones", img:"https://images.unsplash.com/photo-1612016603255-185f1f8eaa2a?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" }
];

let cart = [];

function displayProducts(list) {
const container = document.getElementById("products");
container.innerHTML = "";
list.forEach(p => {
container.innerHTML += `
<div class="card">
<img src="${p.img || 'https://via.placeholder.com/200'}">
<h4>${p.name}</h4>
<div class="price">₹${p.price}</div>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>`;
});
}

function addToCart(name, price) {
cart.push({name,price});
updateCart();
}

function updateCart() {
document.getElementById("cart-count").innerText = cart.length;
}

function filterProducts() {
let filtered = [...products];

const search = document.getElementById("search").value.toLowerCase();
if(search) {
filtered = filtered.filter(p=>p.name.toLowerCase().includes(search));
document.getElementById("extra-filters").style.display = "block";
}

const price = document.getElementById("price").value;
document.getElementById("price-value").innerText = price;
filtered = filtered.filter(p=>p.price <= price || price==0);

const colors = [...document.querySelectorAll(".color:checked")].map(c=>c.value);
if(colors.length) filtered = filtered.filter(p=>colors.includes(p.color));

const brands = [...document.querySelectorAll(".brand:checked")].map(b=>b.value);
if(brands.length) filtered = filtered.filter(p=>brands.includes(p.brand));

const sort = document.getElementById("sort").value;
if(sort=="low") filtered.sort((a,b)=>a.price-b.price);
if(sort=="high") filtered.sort((a,b)=>b.price-a.price);

return filtered;
}

function update() {
displayProducts(filterProducts());
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input", update);
});

displayProducts(products);


</script>
</body>
</html>
